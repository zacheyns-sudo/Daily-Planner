<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable safe zone -->
  <rect width="512" height="512" fill="#2A5C45"/>

  <!-- Content scaled to ~80% and centred (safe zone) -->
  <g transform="translate(51,51) scale(0.8)">
    <!-- D: vertical stem -->
    <rect x="118" y="96" width="76" height="320" fill="#fff"/>
    <!-- D: top arm -->
    <rect x="118" y="96" width="180" height="72" rx="36" fill="#fff"/>
    <!-- D: bottom arm -->
    <rect x="118" y="344" width="180" height="72" rx="36" fill="#fff"/>
    <!-- D: right curve fill -->
    <rect x="250" y="132" width="120" height="248" rx="60" fill="#fff"/>
    <!-- Diagonal slash -->
    <polygon points="148,402 200,430 388,110 336,82" fill="#2A5C45"/>
  </g>
</svg>
