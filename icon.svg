<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="#2A5C45"/>

  <!-- Calendar page — white rounded rect -->
  <rect x="96" y="120" width="320" height="292" rx="24" fill="#ffffff"/>

  <!-- Header bar (accent strip at top of calendar) -->
  <rect x="96" y="120" width="320" height="72" rx="24" fill="#2A5C45"/>
  <!-- Fill bottom corners of header bar square -->
  <rect x="96" y="168" width="320" height="24" fill="#2A5C45"/>

  <!-- Two ring hooks -->
  <rect x="176" y="88" width="28" height="56" rx="14" fill="#ffffff"/>
  <rect x="308" y="88" width="28" height="56" rx="14" fill="#ffffff"/>

  <!-- Grid dots — 3×3 calendar cells -->
  <rect x="136" y="232" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="196" y="232" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="256" y="232" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="316" y="232" width="60" height="32" rx="6" fill="#E8F4EF"/>

  <rect x="136" y="280" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="196" y="280" width="40" height="32" rx="6" fill="#2A5C45"/>
  <rect x="256" y="280" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="316" y="280" width="60" height="32" rx="6" fill="#E8F4EF"/>

  <rect x="136" y="328" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="196" y="328" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="256" y="328" width="40" height="32" rx="6" fill="#E8F4EF"/>
  <rect x="316" y="328" width="60" height="32" rx="6" fill="#E8F4EF"/>
</svg>
