<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#2A5C45"/>

  <!-- Calendar body — white -->
  <rect x="80" y="130" width="352" height="300" rx="20" fill="#ffffff"/>

  <!-- Header band — dark green, top of calendar -->
  <rect x="80" y="130" width="352" height="90" rx="20" fill="#1a3d2e"/>
  <!-- Square off bottom corners of header -->
  <rect x="80" y="175" width="352" height="45" fill="#1a3d2e"/>

  <!-- Header text label dots (M T W T F) -->
  <rect x="108" y="148" width="28" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <rect x="156" y="148" width="28" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <rect x="204" y="148" width="28" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <rect x="252" y="148" width="28" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <rect x="300" y="148" width="28" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <rect x="348" y="148" width="28" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>

  <!-- Two ring hooks — white, clearly visible -->
  <rect x="172" y="96" width="32" height="60" rx="16" fill="#ffffff"/>
  <rect x="308" y="96" width="32" height="60" rx="16" fill="#ffffff"/>

  <!-- Calendar grid — row 1 -->
  <rect x="108" y="242" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="168" y="242" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="228" y="242" width="48" height="38" rx="8" fill="#2A5C45"/>
  <rect x="288" y="242" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="348" y="242" width="48" height="38" rx="8" fill="#f0f0f0"/>

  <!-- Calendar grid — row 2 -->
  <rect x="108" y="292" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="168" y="292" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="228" y="292" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="288" y="292" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="348" y="292" width="48" height="38" rx="8" fill="#f0f0f0"/>

  <!-- Calendar grid — row 3 -->
  <rect x="108" y="342" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="168" y="342" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="228" y="342" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="288" y="342" width="48" height="38" rx="8" fill="#f0f0f0"/>
  <rect x="348" y="342" width="48" height="38" rx="8" fill="#f0f0f0"/>
</svg>
